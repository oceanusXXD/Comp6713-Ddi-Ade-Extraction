# EXP-04：与训练配置 `qwen3_8b_lora_ddi_ade_latest_raw_clean_lowlr_e4.yaml` 对应的推理配置。
#
# 底座路径 `../models/Qwen3-8B` 在本仓库中的解析顺序（见 src.model_utils.try_resolve_existing_path）：
#   1) 仓库根目录的上一级：例如 6713-ass/models/Qwen3-8B（与 configs/README 约定一致）
#   2) 当前工作目录相对路径（若你从仓库根启动脚本，与 1 通常一致）
#   3) 仓库根下的 models/Qwen3-8B：Comp6713-Ddi-Ade-Extraction/models/Qwen3-8B
#
# 若以上都不存在且 allow_remote_model_source 为 true，则回退为 Hugging Face 上的 Qwen/Qwen3-8B。
# 纯离线请改为 false，并确保上述某一本地目录已有完整权重。
seed: 42
system_prompt_path: prompts/medical_relation_extraction_system_prompt.txt
backend: transformers
allow_remote_model_source: true

model:
  base_model_name_or_path: ../models/Qwen3-8B
  tokenizer_name_or_path: null
  adapter_path: outputs/qwen3_8b_lora_ddi_ade_latest_raw_clean_lowlr_e4/final_adapter
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: sdpa
  enable_thinking: false

data:
  split: test
  input_path: data/merged_chatml_test.jsonl
  max_samples: null

inference:
  batch_size: 1
  max_input_length: 4096
  max_new_tokens: 1024
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 6144
  max_lora_rank: 32
  max_loras: 1
  enforce_eager: false
  disable_log_stats: true

output:
  predictions_path: null
  metrics_path: null
  metrics_json_path: null
