seed: 42
system_prompt_path: null
backend: vllm
allow_remote_model_source: false

model:
  base_model_name_or_path: ../models/Qwen3-8B
  tokenizer_name_or_path: null
  adapter_path: null
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: sdpa
  enable_thinking: true

data:
  split: test
  input_path: data/merged_chatml_test.jsonl
  max_samples: null

inference:
  batch_size: 8
  max_input_length: 8192
  max_new_tokens: 32768
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 40960
  max_lora_rank: 64
  max_loras: 1
  enforce_eager: false
  disable_log_stats: true

output:
  predictions_path: results/qwen3_8b_test_base_thinking_official_max_predictions.jsonl
  metrics_path: results/qwen3_8b_test_base_thinking_official_max_metrics.txt
  metrics_json_path: results/qwen3_8b_test_base_thinking_official_max_metrics.json
