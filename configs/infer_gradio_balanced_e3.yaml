seed: 42
system_prompt_path: prompts/medical_relation_extraction_system_prompt.txt
backend: api
allow_remote_model_source: true

model:
  base_model_name_or_path: qwen2.5-14b-instruct
  tokenizer_name_or_path: null
  adapter_path: remote_lora
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: sdpa
  enable_thinking: false

data:
  split: test
  input_path: data/merged_chatml_test.jsonl
  max_samples: null

inference:
  batch_size: 1
  max_input_length: 4096
  max_new_tokens: 1024
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 6144
  max_lora_rank: 32
  max_loras: 1
  enforce_eager: false
  disable_log_stats: true

api:
  base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  api_key_env: QWEN_API_KEY
  api_key: null
  timeout_seconds: 120
  base_model_name: qwen2.5-14b-instruct
  lora_model_name: qwen3.6-max-preview

output:
  predictions_path: null
  metrics_path: null
  metrics_json_path: null
