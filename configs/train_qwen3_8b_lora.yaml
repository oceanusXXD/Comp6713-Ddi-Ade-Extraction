seed: 42
resume_from_checkpoint: null
allow_remote_model_source: false
model_name_or_path: ../models/Qwen3-8B
trust_remote_code: true
torch_dtype: bfloat16
attn_implementation: sdpa
enable_thinking: false
system_prompt_path: null
train_path: data/merged_chatml_train.jsonl
validation_path: data/merged_chatml_validation.jsonl
max_seq_length: 4096
finetune_type: lora
load_in_4bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
per_device_train_batch_size: 6
gradient_accumulation_steps: 3
learning_rate: 0.0001
num_train_epochs: 3
warmup_ratio: 0.03
logging_steps: 5
save_strategy: steps
save_steps: 100
eval_strategy: steps
output_dir: outputs/qwen3_8b_lora
per_device_eval_batch_size: 1
eval_steps: 100
save_total_limit: 2
gradient_checkpointing: true
remove_unused_columns: false
report_to: none
bf16: true
fp16: false
weight_decay: 0.0
lr_scheduler_type: cosine
max_grad_norm: 1.0
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
bias: none
task_type: CAUSAL_LM
modules_to_save: null
bnb_4bit_use_double_quant: true
